<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <script>
        // Set theme BEFORE first paint to prevent flash
        (function () {
            var t = localStorage.getItem('theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>胶片摄影工具箱</title>
    <meta name="theme-color" content="#0D1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="胶片工具箱">

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/lib/anime.min.js"></script>
</head>

<body class="min-h-screen">
    <div class="w-full max-w-md mx-auto flex flex-col h-screen">
        <header class="mb-8 p-4" style="padding-top: max(2rem, env(safe-area-inset-top));">
            <div class="flex justify-end items-center space-x-5">
                <button id="theme-switcher" type="button"
                    class="btn-ripple btn-icon p-2 rounded-full flex items-center justify-center transition-colors duration-300"></button>
                <button id="lang-switcher" type="button"
                    class="btn-ripple btn-secondary text-sm font-bold py-1 px-3 rounded-full"
                    data-lang-key="langSwitch"></button>
            </div>
            <div class="text-center mt-2">
                <h1 class="text-4xl font-black app-title" data-lang-key="title"></h1>
                <p class="text-lg subtitle mt-2 font-semibold" data-lang-key="subtitle"></p>
            </div>
        </header>

        <div id="main-content" style="visibility: hidden; padding-bottom: max(1rem, env(safe-area-inset-bottom));"
            class="flex-1 overflow-y-auto px-4">
            <div class="flex mb-4 p-1 rounded-full bg-[color-mix(in_srgb,var(--bg-secondary)_80%,transparent)] shadow-inner"
                role="tablist" aria-label="Calculators">
                <button id="tab-reciprocity" type="button" role="tab" aria-selected="true"
                    class="tab-button grow font-bold active" data-lang-key="tabReciprocity"></button>
                <button id="tab-dof" type="button" role="tab" aria-selected="false" class="tab-button grow font-bold"
                    data-lang-key="tabDof"></button>
                <button id="tab-flash" type="button" role="tab" aria-selected="false" class="tab-button grow font-bold"
                    data-lang-key="tabFlash"></button>
            </div>
            <div id="panels-wrapper" class="overflow-hidden">
                <div id="panels-container" class="flex transition-transform duration-300 ease-in-out">
                    <div id="panel-reciprocity" role="tabpanel" class="w-full flex-shrink-0">
                        <section class="card p-6 space-y-5">
                            <div>
                                <label for="film-select" class="block mb-1 text-md label"
                                    data-lang-key="labelFilm"></label>
                                <select id="film-select" class="select text-sm"></select>
                            </div>
                            <div id="delete-film-area" class="hidden text-right">
                                <button id="delete-film-btn" type="button"
                                    class="btn-ripple text-red-500 text-sm hover:text-red-400 px-3 py-1 font-semibold"
                                    data-lang-key="deleteThisFilm"></button>
                            </div>
                            <div id="custom-factor-group" class="hidden space-y-2">
                                <label for="custom-factor" class="flex items-center space-x-2 text-md label"> <span
                                        data-lang-key="labelCustomFactor"></span> <span class="tooltip-trigger"
                                        data-tooltip-key="tooltipPValue" tabindex="0">?</span> </label>
                                <div class="input-stepper">
                                    <button type="button" class="stepper-btn stepper-minus" data-target="custom-factor"
                                        data-step="0.01">-</button>
                                    <input type="number" step="any" inputmode="decimal" id="custom-factor" class="input"
                                        data-lang-placeholder="placeholderPValue">
                                    <button type="button" class="stepper-btn stepper-plus" data-target="custom-factor"
                                        data-step="0.01">+</button>
                                </div>
                                <div class="text-right"> <button id="save-custom-btn" type="button"
                                        class="btn-ripple btn-primary font-bold rounded-md px-4 py-2"
                                        data-lang-key="btnSave"></button> </div>
                            </div>
                            <div>
                                <label for="nd-filter-select" class="block mb-1 text-md label"
                                    data-lang-key="labelND"></label>
                                <select id="nd-filter-select" class="select text-sm"></select>
                            </div>
                            <div class="space-y-2">
                                <label class="label flex items-center space-x-2"> <span
                                        data-lang-key="labelBellows"></span> <span class="tooltip-trigger"
                                        data-tooltip-key="tooltipBellows" tabindex="0">?</span> </label>
                                <div class="grid grid-cols-fr-auto gap-x-3 gap-y-2">
                                    <div class="input-stepper">
                                        <button type="button" class="stepper-btn stepper-minus"
                                            data-target="focal-length" data-step="1">-</button>
                                        <input type="number" inputmode="numeric" id="focal-length"
                                            class="input text-center" data-lang-placeholder="placeholderFocalLength">
                                        <button type="button" class="stepper-btn stepper-plus"
                                            data-target="focal-length" data-step="1">+</button>
                                    </div>
                                    <span class="text-gray-400 self-center">mm</span>
                                    <div class="input-stepper">
                                        <button type="button" class="stepper-btn stepper-minus"
                                            data-target="bellows-extension" data-step="1">-</button>
                                        <input type="number" inputmode="numeric" id="bellows-extension"
                                            class="input text-center" data-lang-placeholder="placeholderBellows">
                                        <button type="button" class="stepper-btn stepper-plus"
                                            data-target="bellows-extension" data-step="1">+</button>
                                    </div>
                                    <span class="text-gray-400 self-center">mm</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="label" data-lang-key="labelMeteredTime"></label>
                                <div class="grid grid-cols-fr-auto gap-x-3 gap-y-2">
                                    <div class="input-stepper">
                                        <button type="button" class="stepper-btn stepper-minus"
                                            data-target="metered-time-min" data-step="1">-</button>
                                        <input type="number" inputmode="numeric" id="metered-time-min"
                                            class="input text-center" placeholder="0">
                                        <button type="button" class="stepper-btn stepper-plus"
                                            data-target="metered-time-min" data-step="1">+</button>
                                    </div>
                                    <span class="text-gray-400 self-center" data-lang-key="unitMin"></span>
                                    <div class="input-stepper">
                                        <button type="button" class="stepper-btn stepper-minus"
                                            data-target="metered-time-sec" data-step="1">-</button>
                                        <input type="number" step="any" inputmode="decimal" id="metered-time-sec"
                                            class="input text-center" placeholder="30">
                                        <button type="button" class="stepper-btn stepper-plus"
                                            data-target="metered-time-sec" data-step="1">+</button>
                                    </div>
                                    <span class="text-gray-400 self-center" data-lang-key="unitSec"></span>
                                </div>
                            </div>
                            <div>
                                <label for="shutter-speed-select" class="block mb-1 text-md label"
                                    data-lang-key="labelShutterSpeed"></label>
                                <div class="dial-wrapper">
                                    <div class="dial-indicator"></div>
                                    <div id="shutter-speed-dial" class="dial-container"></div>
                                </div>
                                <input type="hidden" id="shutter-speed-select">
                            </div>
                            <button id="calculate-btn" type="button" class="btn-ripple btn-primary btn-full"
                                data-lang-key="btnCalculate"></button>
                        </section>
                        <div id="message-area" class="mt-6" hidden></div>
                    </div>
                    <div id="panel-dof" role="tabpanel" class="w-full flex-shrink-0">
                        <section class="card p-6 space-y-5">
                            <div>
                                <label for="dof-format" class="flex items-center space-x-2 mb-1 text-md label"> <span
                                        data-lang-key="labelFormat"></span> <span class="tooltip-trigger"
                                        data-tooltip-key="tooltipFormat" tabindex="0">?</span> </label>
                                <select id="dof-format" class="select text-sm"></select>
                            </div>
                            <div>
                                <label for="dof-focal-length" class="block mb-1 text-md label"
                                    data-lang-key="labelHfFocalLength"></label>
                                <div class="input-stepper">
                                    <button type="button" class="stepper-btn stepper-minus"
                                        data-target="dof-focal-length" data-step="1">-</button>
                                    <input type="number" inputmode="numeric" id="dof-focal-length"
                                        class="input text-center" data-lang-placeholder="placeholderHfFocalLength">
                                    <button type="button" class="stepper-btn stepper-plus"
                                        data-target="dof-focal-length" data-step="1">+</button>
                                </div>
                            </div>
                            <div>
                                <label for="dof-aperture" class="block mb-1 text-md label"
                                    data-lang-key="labelHfAperture"></label>
                                <div class="dial-wrapper">
                                    <div class="dial-indicator"></div>
                                    <div id="dof-aperture-dial" class="dial-container">
                                    </div>
                                </div>
                                <input type="hidden" id="dof-aperture">
                            </div>
                            <div>
                                <label for="dof-distance" class="block mb-1 text-md label"
                                    data-lang-key="labelFocusDistance"></label>
                                <div class="input-stepper">
                                    <button type="button" class="stepper-btn stepper-minus" data-target="dof-distance"
                                        data-step="0.5">-</button>
                                    <input type="number" step="any" inputmode="decimal" id="dof-distance"
                                        class="input text-center" data-lang-placeholder="placeholderDistance">
                                    <button type="button" class="stepper-btn stepper-plus" data-target="dof-distance"
                                        data-step="0.5">+</button>
                                </div>
                            </div>
                            <button id="calculate-dof-btn" type="button" class="btn-ripple btn-primary btn-full"
                                data-lang-key="btnCalculateDof"></button>
                        </section>
                        <div id="dof-message-area" class="mt-6" hidden></div>
                    </div>
                    <div id="panel-flash" role="tabpanel" class="w-full flex-shrink-0">
                        <section class="card p-6 space-y-5">
                            <div><label class="block mb-2 text-md label" data-lang-key="labelCalcMode"></label>
                                <div class="flex rounded-md shadow-sm radio-group" role="group"><input type="radio"
                                        id="calc-aperture" name="flash-mode" value="aperture" class="hidden"
                                        checked><label for="calc-aperture"
                                        class="w-full text-center px-4 py-2 text-sm font-medium border-y border-l rounded-l-md"
                                        data-lang-key="calcModeAperture"></label><input type="radio" id="calc-distance"
                                        name="flash-mode" value="distance" class="hidden"><label for="calc-distance"
                                        class="w-full text-center px-4 py-2 text-sm font-medium border-y"
                                        data-lang-key="calcModeDistance"></label><input type="radio" id="calc-power"
                                        name="flash-mode" value="power" class="hidden"><label for="calc-power"
                                        class="w-full text-center px-4 py-2 text-sm font-medium border-y border-r rounded-r-md"
                                        data-lang-key="calcModePower"></label></div>
                            </div>
                            <div>
                                <label for="flash-gn" class="flex items-center space-x-2 mb-1 text-md label"> <span
                                        data-lang-key="labelGuideNumber"></span> <span class="tooltip-trigger"
                                        data-tooltip-key="tooltipGN" tabindex="0">?</span> </label>
                                <div class="input-stepper">
                                    <button type="button" class="stepper-btn stepper-minus" data-target="flash-gn"
                                        data-step="1">-</button>
                                    <input type="number" inputmode="numeric" id="flash-gn" class="input"
                                        data-lang-placeholder="placeholderGuideNumber">
                                    <button type="button" class="stepper-btn stepper-plus" data-target="flash-gn"
                                        data-step="1">+</button>
                                </div>
                            </div>
                            <div>
                                <label for="flash-iso" class="block mb-1 text-md label"
                                    data-lang-key="labelISO"></label>
                                <div class="dial-wrapper">
                                    <div class="dial-indicator"></div>
                                    <div id="flash-iso-dial" class="dial-container">
                                    </div>
                                </div>
                                <input type="hidden" id="flash-iso" value="100">
                            </div>
                            <div><label for="flash-modifier" class="block mb-1 text-md label"
                                    data-lang-key="labelModifier"></label><select id="flash-modifier"
                                    class="select text-sm"></select></div>
                            <div id="flash-aperture-group">
                                <label for="flash-aperture" class="block mb-1 text-md label"
                                    data-lang-key="labelFlashAperture"></label>
                                <div class="dial-wrapper">
                                    <div class="dial-indicator"></div>
                                    <div id="flash-aperture-dial" class="dial-container">
                                    </div>
                                </div>
                                <input type="hidden" id="flash-aperture">
                            </div>
                            <div id="flash-distance-group">
                                <label for="flash-distance" class="block mb-1 text-md label"
                                    data-lang-key="labelDistance"></label>
                                <div class="input-stepper">
                                    <button type="button" class="stepper-btn stepper-minus" data-target="flash-distance"
                                        data-step="0.5">-</button>
                                    <input type="number" step="any" inputmode="decimal" id="flash-distance"
                                        class="input" data-lang-placeholder="placeholderDistance">
                                    <button type="button" class="stepper-btn stepper-plus" data-target="flash-distance"
                                        data-step="0.5">+</button>
                                </div>
                            </div>
                            <div id="flash-power-group">
                                <label for="flash-power" class="block mb-1 text-md label"
                                    data-lang-key="labelFlashPower"></label>
                                <select id="flash-power" class="select text-sm"></select>
                            </div>
                            <button id="calculate-flash-btn" type="button" class="btn-ripple btn-primary btn-full"
                                data-lang-key="btnFlashCalculate"></button>
                        </section>
                        <div id="flash-message-area" class="mt-6" hidden></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="timer-card" class="hidden flex-col items-center justify-center p-10 timer-card card min-h-[60vh]">
            <div class="flex flex-col items-center justify-center">
                <div class="relative w-64 h-64 mx-auto mb-10">
                    <svg class="w-full h-full drop-shadow-xl" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="timer-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--success-color)" />
                                <stop offset="100%" stop-color="#059669" />
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring-bg" cx="50" cy="50" r="47"></circle>
                        <circle id="progress-ring" class="progress-ring-fg" cx="50" cy="50" r="47"
                            stroke="url(#timer-gradient)"></circle>
                    </svg>
                    <h2 id="timer-display"
                        class="absolute inset-0 flex items-center justify-center font-normal mono-num"
                        style="font-size: 3.5rem; letter-spacing: -0.05em; text-shadow: 0 4px 12px rgba(0,0,0,0.1);">
                        00:00</h2>
                </div>
                <button id="stop-timer-btn" type="button"
                    class="btn-ripple rounded-full px-8 py-3 font-bold text-sm tracking-widest"
                    style="background-color: transparent; border: 1px solid color-mix(in srgb, var(--error-color) 40%, var(--border-color)); color: var(--error-color); box-shadow: var(--shadow-drop);"
                    data-lang-key="btnStopTimer"></button>
            </div>
        </div>
        <div id="save-modal" class="hidden modal-overlay">
            <div class="card p-6 w-full max-w-sm">
                <h3 class="text-xl font-bold mb-4" data-lang-key="modalSaveTitle"></h3> <label for="custom-film-name"
                    class="block mb-1 text-md label" data-lang-key="modalSaveLabel"></label> <input type="text"
                    id="custom-film-name" class="input" data-lang-placeholder="modalSavePlaceholder">
                <div class="flex justify-end space-x-4 mt-6"> <button id="cancel-save-btn" type="button"
                        class="btn-ripple btn-secondary btn-sm" data-lang-key="btnCancel"></button> <button
                        id="confirm-save-btn" type="button" class="btn-ripple btn-primary btn-sm"
                        data-lang-key="btnConfirmSave"></button> </div>
            </div>
        </div>
        <div id="delete-modal" class="hidden modal-overlay">
            <div class="card p-6 w-full max-w-sm">
                <h3 class="text-xl font-bold mb-4" data-lang-key="modalDeleteTitle"></h3>
                <p id="delete-confirm-text" class="mb-6"></p>
                <div class="flex justify-end space-x-4"> <button id="cancel-delete-btn" type="button"
                        class="btn-ripple btn-secondary btn-sm" data-lang-key="btnCancel"></button> <button
                        id="confirm-delete-btn" type="button" class="btn-ripple btn-danger btn-sm"
                        data-lang-key="btnConfirmDelete"></button> </div>
            </div>
        </div>
    </div>
    <div id="global-tooltip"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
